<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🌍 Language Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<div class="bg-animation">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<div class="container">

    <header class="header">
        <div class="logo">
            <span>🌍</span>
            <div>
                <h1>LinguaAI</h1>
                <span class="tagline">Smart Language Translator</span>
            </div>
        </div>
        <div class="badges">
            <span class="badge"><i class="fas fa-globe"></i> 60+ Languages</span>
            <span class="badge"><i class="fas fa-bolt"></i> Instant</span>
            <span class="badge"><i class="fas fa-brain"></i> AI Powered</span>
        </div>
    </header>

    <main class="card">

        <div class="lang-bar">
            <div class="lang-wrap">
                <label><i class="fas fa-language"></i> From</label>
                <select id="sourceLang" class="lang-select">
                    <option value="auto">🔍 Auto Detect</option>
                    {% for code, name in languages.items() %}
                    <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button class="swap-btn" id="swapBtn">
                <i class="fas fa-right-left"></i>
            </button>

            <div class="lang-wrap">
                <label><i class="fas fa-flag"></i> To</label>
                <select id="targetLang" class="lang-select">
                    {% for code, name in languages.items() %}
                    <option value="{{ code }}"
                        {% if code == 'en' %}selected{% endif %}>
                        {{ name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="translate-area">

            <div class="panel">
                <div class="panel-top">
                    <span><i class="fas fa-edit"></i> Source Text</span>
                    <div class="panel-btns">
                        <button class="sm-btn" id="clearBtn">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                        <button class="sm-btn" id="pasteBtn">
                            <i class="fas fa-paste"></i> Paste
                        </button>
                    </div>
                </div>
                <textarea id="inputText"
                    placeholder="✍️ Type or paste text here..."
                    maxlength="5000"></textarea>
                <div class="panel-bottom">
                    <span id="charCount">0</span>/5000
                    <button class="icon-btn" id="speakInput">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>

            <div class="middle">
                <button class="translate-btn" id="translateBtn">
                    <i class="fas fa-language"></i>
                    <span>GO</span>
                </button>
            </div>

            <div class="panel output-panel">
                <div class="panel-top">
                    <span><i class="fas fa-globe"></i> Translation</span>
                    <div class="panel-btns">
                        <button class="sm-btn" id="copyBtn">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                        <button class="sm-btn" id="speakOutput">
                            <i class="fas fa-headphones"></i> Listen
                        </button>
                    </div>
                </div>
                <div class="output-area" id="outputText">
                    <div class="output-placeholder">
                        <i class="fas fa-magic"></i>
                        <p>Translation appears here</p>
                    </div>
                </div>
                <div class="panel-bottom">
                    <span id="langInfo"></span>
                </div>
            </div>

        </div>

        <div class="quick-langs">
            <span class="ql-label"><i class="fas fa-bolt"></i> Quick:</span>
            <button class="ql-btn" data-lang="es">🇪🇸 Spanish</button>
            <button class="ql-btn" data-lang="fr">🇫🇷 French</button>
            <button class="ql-btn" data-lang="de">🇩🇪 German</button>
            <button class="ql-btn" data-lang="ja">🇯🇵 Japanese</button>
            <button class="ql-btn" data-lang="zh-CN">🇨🇳 Chinese</button>
            <button class="ql-btn" data-lang="ar">🇸🇦 Arabic</button>
            <button class="ql-btn" data-lang="hi">🇮🇳 Hindi</button>
            <button class="ql-btn" data-lang="ru">🇷🇺 Russian</button>
        </div>

    </main>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Done!</span>
    </div>

    <footer class="footer">
        <p>Built with ❤️ using Python · Flask · Deep Translator API</p>
    </footer>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
