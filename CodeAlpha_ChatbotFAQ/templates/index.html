<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🤖 Smart Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<div class="bg-anim">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
</div>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-list-ul"></i> Topics</h3>
            <span id="faqCount" class="count-badge">0</span>
        </div>

        <div class="cats">
            <button class="cat active" data-cat="all">
                <i class="fas fa-th"></i> All
            </button>
            <button class="cat" data-cat="ai">
                <i class="fas fa-robot"></i> AI & ML
            </button>
            <button class="cat" data-cat="python">
                <i class="fab fa-python"></i> Python
            </button>
            <button class="cat" data-cat="tools">
                <i class="fas fa-tools"></i> Tools
            </button>
        </div>

        <div class="faq-list" id="faqList"></div>
    </div>

    <!-- Chat -->
    <div class="chat-box">

        <!-- Header -->
        <div class="chat-header">
            <div class="bot-profile">
                <div class="avatar">
                    <i class="fas fa-robot"></i>
                    <span class="dot"></span>
                </div>
                <div>
                    <h2>AI Assistant</h2>
                    <small><i class="fas fa-circle"></i> Online</small>
                </div>
            </div>
            <div class="hdr-btns">
                <button class="hdr-btn" id="clearBtn" title="Clear">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="hdr-btn" id="themeBtn" title="Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
            <div class="msg bot">
                <div class="msg-avatar"><i class="fas fa-robot"></i></div>
                <div class="msg-body">
                    <div class="bubble">
                        <p>👋 Hello! I am your <strong>AI Assistant</strong>!</p>
                        <p>Ask me about:</p>
                        <ul>
                            <li>🤖 Artificial Intelligence</li>
                            <li>📊 Machine Learning</li>
                            <li>🐍 Python Programming</li>
                            <li>🛠️ AI Tools & Frameworks</li>
                        </ul>
                    </div>
                    <span class="time">Just now</span>
                </div>
            </div>
        </div>

        <!-- Quick Questions -->
        <div class="quick-q">
            <span><i class="fas fa-bolt"></i> Try:</span>
            <div class="q-btns">
                <button class="q-btn" data-q="What is machine learning?">What is ML?</button>
                <button class="q-btn" data-q="What is Python?">Python?</button>
                <button class="q-btn" data-q="What is YOLO?">YOLO?</button>
                <button class="q-btn" data-q="How do I start learning AI?">Start AI?</button>
                <button class="q-btn" data-q="What is deep learning?">Deep Learning?</button>
                <button class="q-btn" data-q="What is Flask?">Flask?</button>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput"
                       placeholder="💬 Ask me anything..."
                       maxlength="500" autocomplete="off"/>
                <div class="inp-btns">
                    <button class="voice-btn" id="voiceBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
            <div class="inp-footer">
                <span><span id="charCount">0</span>/500</span>
                <span>Press <kbd>Enter</kbd> to send</span>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
